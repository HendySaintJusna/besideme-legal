<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BesideMe — Legal</title>
<style>
  :root { --accent:#DB4A86; --ink:#2C2230; --muted:#5E4C56; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--ink);
         background:linear-gradient(180deg,#FDF1F6,#F7E6F0); min-height:100vh; }
  .wrap { max-width:760px; margin:0 auto; padding:48px 22px; }
  h1 { color:var(--accent); font-size:34px; margin:0 0 6px; }
  p { color:var(--muted); line-height:1.6; }
  a.card { display:block; background:#fff; border:1px solid #F0DAE4; border-radius:16px; padding:18px 20px;
           margin:14px 0; text-decoration:none; color:var(--ink); font-weight:700; }
  a.card span { display:block; color:var(--muted); font-weight:400; font-size:14px; margin-top:4px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>BesideMe</h1>
    <p>Legal documents for the BesideMe app.</p>
    <a class="card" href="./terms.html">Terms of Service <span>The rules for using BesideMe.</span></a>
    <a class="card" href="./privacy.html">Privacy Policy <span>How we handle your data.</span></a>
  </div>
</body>
</html>
